version: "3"

services:

  agent:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m

volumes:
  ollama-data: